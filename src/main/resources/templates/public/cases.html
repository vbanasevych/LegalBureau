<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Публічний реєстр справ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="d-flex justify-content-between mb-4">
    <h2>Публічний реєстр справ</h2>
    <a th:href="@{/}" class="btn btn-secondary">На головну</a>
</div>

<div class="card bg-light mb-4 border-0 shadow-sm">
    <div class="card-body">
        <form th:action="@{/public/cases}" method="get" class="row g-3">
            <div class="col-md-5">
                <select name="categoryId" class="form-select">
                    <option value="">Усі категорії</option>
                    <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == searchCategoryId}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <select name="status" class="form-select">
                    <option value="">Усі статуси</option>
                    <option th:each="st : ${statuses}" th:value="${st.name()}" th:text="${st.displayValue}" th:selected="${st == searchStatus}"></option>
                </select>
            </div>
            <div class="col-md-3 d-grid"><button type="submit" class="btn btn-primary">Застосувати</button></div>
        </form>
    </div>
</div>

<table class="table table-hover shadow-sm bg-white rounded">
    <thead class="table-dark">
    <tr>
        <th>Номер справи</th>
        <th>Категорія</th>
        <th>Дата реєстрації</th>
        <th>Статус</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${casePage.content}">
        <td class="fw-bold" th:text="${c.caseNumber}"></td>
        <td th:text="${c.category.name}"></td>
        <td th:text="${#temporals.format(c.createdAt, 'dd.MM.yyyy')}"></td>
        <td><span class="badge bg-secondary" th:text="${c.status.displayValue}"></span></td>
    </tr>

    <tr th:if="${#lists.isEmpty(casePage.content)}">
        <td colspan="4" class="text-center text-muted py-5">
            <h5>На жаль, за вашим запитом нічого не знайдено.</h5>
            <a th:href="@{/public/cases}" class="btn btn-outline-secondary btn-sm mt-2">Скинути фільтри</a>
        </td>
    </tr>
    </tbody>
</table>

<nav th:if="${casePage.totalPages > 1}" class="mt-4">
    <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${casePage.first ? 'disabled' : ''}"><a class="page-link" th:href="@{/public/cases(page=${casePage.number - 1}, categoryId=${searchCategoryId}, status=${searchStatus})}">Попередня</a></li>
        <li class="page-item" th:each="i : ${#numbers.sequence(0, casePage.totalPages - 1)}" th:classappend="${casePage.number == i ? 'active' : ''}"><a class="page-link" th:href="@{/public/cases(page=${i}, categoryId=${searchCategoryId}, status=${searchStatus})}" th:text="${i + 1}"></a></li>
        <li class="page-item" th:classappend="${casePage.last ? 'disabled' : ''}"><a class="page-link" th:href="@{/public/cases(page=${casePage.number + 1}, categoryId=${searchCategoryId}, status=${searchStatus})}">Наступна</a></li>
    </ul>
</nav>
</body>
</html>
