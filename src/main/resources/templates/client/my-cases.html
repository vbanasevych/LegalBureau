<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Мої запити</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Мої юридичні справи</h2>
    <div>
        <a th:href="@{/client/lawyers}" class="btn btn-outline-primary me-2">Знайти адвоката</a>
        <a th:href="@{/client/request}" class="btn btn-primary">➕ Новий запит</a>
        <a th:href="@{/}" class="btn btn-secondary ms-2">На головну</a>
    </div>
</div>

<div class="card bg-light mb-4 border-0 shadow-sm">
    <div class="card-body">
        <form th:action="@{/client/my-cases}" method="get" class="row g-3 align-items-end">
            <div class="col-md-4">
                <label class="form-label small text-muted">Категорія справи</label>
                <select name="categoryId" class="form-select">
                    <option value="">Усі категорії</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${cat.id == searchCategoryId}"></option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label small text-muted">Статус</label>
                <select name="status" class="form-select">
                    <option value="">Усі статуси</option>
                    <option th:each="st : ${statuses}"
                            th:value="${st.name()}"
                            th:text="${st.displayValue}"
                            th:selected="${st == searchStatus}"></option>
                </select>
            </div>
            <div class="col-md-4 d-grid gap-2 d-md-block">
                <button type="submit" class="btn btn-primary">Застосувати</button>
                <a th:href="@{/client/my-cases}" class="btn btn-outline-secondary">Скинути</a>
            </div>
        </form>
    </div>
</div>

<div class="table-responsive shadow-sm rounded">
    <table class="table table-hover align-middle mb-0">
        <thead class="table-dark">
        <tr>
            <th>№ справи</th>
            <th>Категорія</th>
            <th>Адвокат</th>
            <th>Дата створення</th>
            <th>Статус</th>
            <th class="text-center">Дії</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="c : ${casePage.content}">
            <td class="fw-bold text-primary" th:text="${c.caseNumber}"></td>
            <td th:text="${c.category.name}"></td>
            <td th:text="${c.lawyer != null ? c.lawyer.fullName : 'Не призначено'}"></td>
            <td th:text="${#temporals.format(c.createdAt, 'dd.MM.yyyy HH:mm')}"></td>
            <td>
                        <span th:classappend="${c.status.name() == 'NEW' ? 'bg-warning text-dark' :
                                             (c.status.name() == 'COMPLETED' ? 'bg-success' :
                                             (c.status.name() == 'DECLINED' ? 'bg-danger' : 'bg-primary'))}"
                              class="badge" th:text="${c.status.displayValue}"></span>
            </td>
            <td class="text-center">
                <a th:href="@{/client/cases/{id}(id=${c.id})}" class="btn btn-sm btn-info">Переглянути</a>
            </td>

        </tr>
        <tr th:if="${#lists.isEmpty(casePage.content)}">
            <td colspan="6" class="text-center text-muted py-4">Справ за вашим запитом не знайдено.</td>
        </tr>
        </tbody>
    </table>
</div>

<nav th:if="${casePage.totalPages > 1}" class="mt-4">
    <ul class="pagination justify-content-center">
        <li class="page-item" th:classappend="${casePage.first ? 'disabled' : ''}">
            <a class="page-link" th:href="@{/client/my-cases(page=${casePage.number - 1}, categoryId=${searchCategoryId}, status=${searchStatus})}">Попередня</a>
        </li>

        <li class="page-item" th:each="i : ${#numbers.sequence(0, casePage.totalPages - 1)}"
            th:classappend="${casePage.number == i ? 'active' : ''}">
            <a class="page-link" th:href="@{/client/my-cases(page=${i}, categoryId=${searchCategoryId}, status=${searchStatus})}" th:text="${i + 1}"></a>
        </li>

        <li class="page-item" th:classappend="${casePage.last ? 'disabled' : ''}">
            <a class="page-link" th:href="@{/client/my-cases(page=${casePage.number + 1}, categoryId=${searchCategoryId}, status=${searchStatus})}">Наступна</a>
        </li>
    </ul>
</nav>

</body>
</html>
