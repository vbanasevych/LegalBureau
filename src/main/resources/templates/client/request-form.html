<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Подати запит</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<ul class="nav nav-pills mb-4">
    <li class="nav-item"><a class="nav-link" th:href="@{/client/my-cases}">Мої запити</a></li>
    <li class="nav-item"><a class="nav-link" th:href="@{/client/lawyers}">Каталог адвокатів</a></li>
    <li class="nav-item"><a class="nav-link active" th:href="@{/client/request}">Подати запит</a></li>
    <li class="nav-item ms-auto"><a class="nav-link text-danger" th:href="@{/}">На головну</a></li>
</ul>

<h2>Новий запит на юридичну допомогу</h2>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<form th:action="@{/client/request}" th:object="${legalCase}" method="post" class="mt-3 w-50">

    <div class="mb-3">
        <label class="form-label fw-bold">Категорія справи:</label>
        <select name="categoryId" class="form-select" required>
            <option value="">-- Оберіть категорію --</option>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Адвокат:</label>
        <select name="lawyerId" class="form-select" required>
            <option value="">-- Оберіть адвоката --</option>
            <option th:each="lawyer : ${lawyers}"
                    th:value="${lawyer.id}"
                    th:text="${lawyer.fullName} + ' (' + ${lawyer.hourlyRate} + ' грн/год) - Спеціалізації: ' + ${lawyer.specializationsText}"
                    th:selected="${lawyer.id == selectedLawyerId}">
            </option>
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label fw-bold">Короткий опис проблеми (приватна інформація):</label>
        <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Опишіть вашу ситуацію..." required></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Надіслати запит</button>
    <a th:href="@{/client/my-cases}" class="btn btn-secondary">Скасувати</a>
</form>
</body>
</html>
