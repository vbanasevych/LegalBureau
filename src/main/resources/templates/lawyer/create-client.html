<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Реєстрація клієнта</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-5">
        <h3 class="mb-4">👤 Реєстрація нового клієнта</h3>

        <div th:if="${error}" class="alert alert-warning" th:text="${error}"></div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <form th:action="@{/lawyer/clients/create}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Email (Логін)</label>
                        <input type="email" name="email" class="form-control" th:value="${email}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">ПІБ (Повне ім'я)</label>
                        <input type="text" name="fullName" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Номер телефону</label>
                        <input type="text" name="phone" class="form-control" placeholder="+380..." required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">Зберегти та продовжити</button>
                        <a th:href="@{/lawyer/cases/create}" class="btn btn-light">Назад до створення справи</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
