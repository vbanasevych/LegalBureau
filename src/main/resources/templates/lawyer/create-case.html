<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Створити нову справу</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-6">
        <h3 class="mb-4">💼 Відкриття нової справи</h3>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="card shadow-sm border-0">
            <div class="card-body">
                <form th:action="@{/lawyer/cases/create}" method="post" th:object="${legalCase}">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email клієнта (пошук)</label>
                        <input type="email" name="clientEmail" class="form-control" th:value="${clientEmail}" placeholder="клієнт@mail.com" required>
                        <div class="form-text text-danger">Якщо клієнта не існує, система запропонує його створити.</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Категорія справи</label>
                        <select name="categoryId" class="form-select" required>
                            <option value="">-- Оберіть категорію --</option>
                            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Початковий опис проблеми</label>
                        <textarea th:field="*{description}" class="form-control" rows="4" required></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Відкрити справу</button>
                        <a th:href="@{/lawyer/my-cases}" class="btn btn-light">Скасувати</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
