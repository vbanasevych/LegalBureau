<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Управління адвокатами</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">⚖️ Admin Panel</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">📊 Аналітика</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/clients}">👤 Клієнти</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/lawyers}">👨‍⚖️ Адвокати</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/cases}">📁 Справи</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/categories}">🏷️ Категорії</a></li>
            </ul>
            <a th:href="@{/}" class="btn btn-outline-light btn-sm">На головну</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Список адвокатів бюро</h2>
        <a th:href="@{/admin/lawyers/create}" class="btn btn-success">➕ Додати адвоката</a>
    </div>

    <table class="table table-bordered table-striped mt-3">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>ПІБ</th>
            <th>Email</th>
            <th>Місто</th>
            <th>Ставка (грн/год)</th>
            <th>Спеціалізації</th>
            <th>Статус</th>
            <th class="text-center">Дії</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="lawyer : ${lawyers}">
            <td th:text="${lawyer.id}"></td>
            <td class="fw-bold" th:text="${lawyer.fullName}"></td>
            <td th:text="${lawyer.email}"></td>
            <td th:text="${lawyer.city}"></td>
            <td th:text="${lawyer.hourlyRate}"></td>
            <td>
            <span th:each="cat, stat : ${lawyer.specializations}"
                  th:text="${cat.name} + ${!stat.last ? ', ' : ''}"></span>
                <span th:if="${#lists.isEmpty(lawyer.specializations)}" class="text-muted">Не вказано</span>
            </td>
            <td>
                <span th:if="${lawyer.active}" class="badge bg-success">Активний</span>
                <span th:unless="${lawyer.active}" class="badge bg-danger">Заблокований</span>
            </td>
            <td class="text-center d-flex justify-content-center gap-1">
                <a th:href="@{/admin/lawyers/edit/{id}(id=${lawyer.id})}" class="btn btn-sm btn-primary"
                   title="Редагувати">✏️</a>
                <form th:action="@{/admin/lawyers/toggle-status/{id}(id=${lawyer.id})}" method="post">
                    <button type="submit" class="btn btn-sm"
                            th:classappend="${lawyer.active ? 'btn-warning' : 'btn-success'}"
                            th:title="${lawyer.active ? 'Заблокувати' : 'Розблокувати'}"
                            th:text="${lawyer.active ? '🔒' : '🔓'}"></button>
                </form>
                <a th:href="@{/admin/lawyers/delete/{id}(id=${lawyer.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('Ви впевнені, що хочете видалити цього адвоката?');" title="Видалити">🗑</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
