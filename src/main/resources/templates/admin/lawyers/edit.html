<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Редагувати адвоката</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>Редагувати профіль адвоката</h2>

<form th:action="@{/admin/lawyers/edit/{id}(id=${lawyer.id})}" th:object="${lawyer}" method="post" class="mt-4 w-50">
    <div class="mb-3">
        <label>ПІБ:</label>
        <input type="text" th:field="*{fullName}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label>Телефон:</label>
        <input type="text" th:field="*{phone}" class="form-control"
               placeholder="+380-XXX-XXX-XXX"
               pattern="\+380-[0-9]{3}-[0-9]{3}-[0-9]{3}"
               title="Формат номеру має бути: +380-XXX-XXX-XXX" required/>
    </div>
    <div class="mb-3">
        <label>Місто:</label>
        <input type="text" th:field="*{city}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label>Вартість консультації (грн/год):</label>
        <input type="number" step="50" th:field="*{hourlyRate}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label>Спеціалізація (затисніть Ctrl для вибору декількох):</label>
        <select name="categoryIds" class="form-select" multiple required>
            <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}"
                    th:selected="${lawyer.specializations.contains(cat)}"></option>
        </select>
    </div>
    <button type="submit" class="btn btn-primary">Зберегти зміни</button>
    <a th:href="@{/admin/lawyers}" class="btn btn-secondary">Скасувати</a>
</form>
</body>
</html>
