<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Дані клієнта</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="bg-light">

<div class="container mt-5">
    <h2 th:text="${client.id == null ? 'Створити нового клієнта' : 'Редагувати клієнта'}"></h2>
    <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>

    <div class="card shadow-sm mt-4 w-50 border-0">
        <div class="card-body">
            <form th:action="${client.id == null ? '/admin/clients/create' : '/admin/clients/edit/' + client.id}"
                  th:object="${client}" method="post">

                <div class="mb-3">
                    <label class="form-label">ПІБ:</label>
                    <input type="text" th:field="*{fullName}" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email:</label>
                    <input type="email" th:field="*{email}" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Телефон:</label>
                    <input type="text" th:field="*{phone}" class="form-control" required/>
                </div>
                <div class="mb-3">
                    <label class="form-label">Пароль <span th:if="${client.id != null}" class="text-muted small">(Залиште порожнім, щоб не змінювати)</span>:</label>
                    <input type="password" th:field="*{passwordHash}" class="form-control" th:required="${client.id == null}"/>
                </div>

                <button type="submit" class="btn btn-success" th:text="${client.id == null ? 'Створити клієнта' : 'Зберегти зміни'}"></button>
                <a th:href="@{/admin/clients}" class="btn btn-secondary">Скасувати</a>
            </form>
        </div>
    </div>
</div>
</body>
</html>
