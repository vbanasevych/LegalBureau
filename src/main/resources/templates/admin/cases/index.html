<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Управління справами (Адмін)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">⚖️ Admin Panel</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/dashboard}">📊 Аналітика</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/clients}">👤 Клієнти</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/lawyers}">👨‍⚖️ Адвокати</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/cases}">📁 Справи</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/admin/categories}">🏷️ Категорії</a></li>
            </ul>
            <a th:href="@{/}" class="btn btn-outline-light btn-sm">На головну</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📁 Управління всіма справами</h2>
    </div>
    <form th:action="@{/admin/cases}" method="get" class="row g-3 mb-4 bg-white p-3 shadow-sm rounded border">
        <div class="col-md-3">
            <input type="text" name="caseNumber" class="form-control" placeholder="Номер CASE-..." th:value="${searchCaseNumber}">
        </div>
        <div class="col-md-3">
            <select name="categoryId" class="form-select">
                <option value="">Усі категорії</option>
                <option th:each="cat : ${categories}" th:value="${cat.id}" th:text="${cat.name}" th:selected="${cat.id == searchCategoryId}"></option>
            </select>
        </div>
        <div class="col-md-3">
            <select name="status" class="form-select">
                <option value="">Усі статуси</option>
                <option th:each="st : ${statuses}" th:value="${st.name()}" th:text="${st.displayValue}" th:selected="${st == searchStatus}"></option>
            </select>
        </div>
        <div class="col-md-3 d-grid gap-2 d-md-flex">
            <button type="submit" class="btn btn-primary w-100">Шукати</button>
            <a th:href="@{/admin/cases}" class="btn btn-outline-secondary w-100">Скинути</a>
        </div>
    </form>

    <div class="table-responsive shadow-sm rounded bg-white">
        <table class="table table-hover align-middle mb-0 border">
            <thead class="table-dark">
            <tr>
                <th>Номер</th>
                <th>Клієнт</th>
                <th>Адвокат</th>
                <th>Категорія</th>
                <th>Статус</th>
                <th class="text-center">Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="c : ${casePage.content}">
                <td class="fw-bold" th:text="${c.caseNumber}"></td>
                <td th:text="${c.client != null ? c.client.fullName : 'Видалений клієнт'}"></td>
                <td th:text="${c.lawyer != null ? c.lawyer.fullName : 'Немає'}"></td>
                <td th:text="${c.category.name}"></td>
                <td><span class="badge bg-secondary" th:text="${c.status.displayValue}"></span></td>
                <td class="text-center d-flex justify-content-center gap-1">
                    <a th:href="@{/admin/cases/edit/{id}(id=${c.id})}" class="btn btn-sm btn-primary" title="Редагувати">✏️</a>
                    <a th:href="@{/admin/cases/delete/{id}(id=${c.id})}" class="btn btn-sm btn-danger"
                       onclick="return confirm('Видалити цю справу назавжди?');" title="Видалити">🗑</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(casePage.content)}">
                <td colspan="6" class="text-center text-muted py-4">Справ ще немає.</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${casePage.totalPages > 1}" class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${casePage.first ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/admin/cases(page=${casePage.number - 1}, caseNumber=${searchCaseNumber}, categoryId=${searchCategoryId}, status=${searchStatus})}">Попередня</a>
            </li>
            <li class="page-item" th:each="i : ${#numbers.sequence(0, casePage.totalPages - 1)}" th:classappend="${casePage.number == i ? 'active' : ''}">
                <a class="page-link" th:href="@{/admin/cases(page=${i}, caseNumber=${searchCaseNumber}, categoryId=${searchCategoryId}, status=${searchStatus})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${casePage.last ? 'disabled' : ''}">
                <a class="page-link" th:href="@{/admin/cases(page=${casePage.number + 1}, caseNumber=${searchCaseNumber}, categoryId=${searchCategoryId}, status=${searchStatus})}">Наступна</a>
            </li>
        </ul>
    </nav>
</div>
</body>
</html>
