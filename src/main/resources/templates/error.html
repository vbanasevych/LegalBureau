<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Ой, сталася помилка!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="text-center p-5 bg-white shadow rounded border">
    <h1 class="display-1 text-danger fw-bold" th:text="${status ?: 'Помилка'}"></h1>
    <h3 class="mb-4">Щось пішло не так...</h3>

    <p class="text-muted mb-4" th:text="${error ?: 'Ми вже знаємо про проблему і працюємо над нею.'}"></p>

    <p class="text-danger small" th:if="${message}" th:text="${message}"></p>

    <a th:href="@{/}" class="btn btn-primary mt-3">🔙 Повернутися на головну</a>
</div>

</body>
</html>
