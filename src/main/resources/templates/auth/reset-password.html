<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Новий пароль</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-5">
        <h3 class="text-center mb-4">Створення нового пароля</h3>

        <div th:if="${error}" class="alert alert-danger text-center shadow-sm" th:text="${error}"></div>

        <form th:action="@{/reset-password}" method="post" id="resetForm">
            <input type="hidden" name="token" th:value="${token}"/>

            <div class="mb-3">
                <label>Новий пароль:</label>
                <div class="input-group">
                    <input type="password" name="password" id="registerPassword" class="form-control" required/>
                    <button class="btn btn-outline-secondary toggle-password" type="button" data-target="registerPassword">👁️</button>
                </div>
                <ul class="list-unstyled mt-2 small">
                    <li id="req-length" class="text-danger mb-1">❌ Від 8 до 20 символів</li>
                    <li id="req-digit" class="text-danger mb-1">❌ Мінімум одна цифра</li>
                    <li id="req-spec" class="text-danger mb-1">❌ Мінімум один спецсимвол (! _ @ # $ % ^ & *)</li>
                </ul>
            </div>

            <div class="mb-3">
                <label>Підтвердіть пароль:</label>
                <div class="input-group">
                    <input type="password" name="confirmPassword" id="confirmPassword" class="form-control" required/>
                    <button class="btn btn-outline-secondary toggle-password" type="button" data-target="confirmPassword">👁️</button>
                </div>
                <small id="match-error" class="text-danger d-none mt-1">❌ Паролі не співпадають</small>
            </div>

            <div class="d-grid mt-4">
                <button type="submit" id="submitBtn" class="btn btn-success" disabled>Зберегти пароль</button>
            </div>
        </form>
    </div>
</div>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
