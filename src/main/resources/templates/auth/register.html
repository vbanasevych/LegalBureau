<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Реєстрація</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css?v=1}" rel="stylesheet">
</head>
<body class="container mt-5">
<h2>Реєстрація клієнта</h2>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<form th:action="@{/register}" th:object="${user}" method="post" class="w-50">
    <div class="mb-3">
        <label>ПІБ:</label>
        <input type="text" th:field="*{fullName}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label>Email:</label>
        <input type="email" th:field="*{email}" class="form-control" required/>
    </div>
    <div class="mb-3">
        <label class="form-label">Пароль:</label>
        <div class="input-group">
            <input type="password" th:field="*{passwordHash}" id="registerPassword" class="form-control" required/>
            <button class="btn btn-outline-secondary toggle-password" type="button" data-target="registerPassword">
                👁️
            </button>
        </div>
    </div>
    <div class="mb-3">
        <label>Телефон:</label>
        <input type="text" th:field="*{phone}" class="form-control"
               placeholder="+380-XXX-XXX-XXX"
               pattern="\+380-[0-9]{3}-[0-9]{3}-[0-9]{3}"
               title="Формат номеру має бути: +380-XXX-XXX-XXX" required/>
    </div>
    <button type="submit" class="btn btn-primary">Зареєструватися</button>
    <a th:href="@{/}" class="btn btn-primary">🔙 Повернутися на головну</a>
</form>
<script th:src="@{/js/script.js}"></script>
</body>
</html>
