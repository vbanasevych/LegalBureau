<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Відновлення пароля</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-5">
        <h3 class="text-center mb-4">Відновлення пароля</h3>
        <p class="text-muted text-center">Введіть ваш email, і ми надішлемо вам посилання для зміни пароля.</p>

        <form th:action="@{/forgot-password}" method="post">
            <div class="mb-3">
                <label>Email:</label>
                <input type="email" name="email" class="form-control" required autofocus/>
            </div>
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Відправити посилання</button>
                <a th:href="@{/login}" class="btn btn-outline-secondary">🔙 Назад до входу</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
