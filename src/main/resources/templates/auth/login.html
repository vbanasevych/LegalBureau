<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css?v=1}" rel="stylesheet">
</head>
<body class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-4">
        <h3 class="text-center mb-4">Вхід у систему</h3>

        <div th:if="${info}" class="alert alert-info text-center shadow-sm" th:text="${info}"></div>

        <div th:if="${param.error}" class="alert alert-danger">
            Невірний email або пароль.
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            Ви успішно вийшли з системи.
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label>Email:</label>
                <input type="email" name="email" class="form-control" required autofocus/>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль:</label>
                <div class="input-group">
                    <input type="password" name="password" id="loginPassword" class="form-control" required/>
                    <button class="btn btn-outline-secondary toggle-password" type="button" data-target="loginPassword">
                        👁️
                    </button>
                </div>
            </div>
            <div class="d-grid gap-2 mt-4">
                <button type="submit" class="btn btn-primary">Увійти</button>
                <a th:href="@{/}" class="btn btn-outline-secondary">Повернутися на головну</a>
            </div>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/register}" class="text-decoration-none">Немає акаунту? Зареєструватися</a>
        </div>
    </div>
    <script th:src="@{/js/script.js}"></script>
</div>
</body>
</html>
